name: cuda118
channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  # Core
  - python=3.10
  - pip

  # PyTorch + CUDA
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8

  # Scientific stack
  - numpy
  - pandas

  # Jupyter / interactive
  - ipython
  - ipykernel

  # Utilities
  - pillow
  - requests

  # pip-only packages
  - pip:
      - easyocr
